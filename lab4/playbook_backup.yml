---
# Playbook de exemplo - Backup automático de configurações
# Laboratório CCNA Automation

- name: Backup das configuracoes de rede
  hosts: all
  gather_facts: no

  tasks:
    - name: Coleta configuracao em execucao
      ios_command:
        commands:
          - show running-config
      register: config_atual

    - name: Salva backup localmente
      copy:
        content: "{{ config_atual.stdout[0] }}"
        dest: "./backups/{{ inventory_hostname }}.cfg"
